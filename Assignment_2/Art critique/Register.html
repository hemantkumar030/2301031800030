<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Art Critiques</title>
    <link rel="stylesheet" href="Register.css">
</head>
<body>
    <header>
        <div class="logo"><img src="/logo.png" height="50px" width="100px" style="border-radius: 5px;"></div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Upload Artwork</a>
            <a href="#">About Us</a>
            <a href="#">Pricing</a>
        </nav>
        <a href="/login.html" class="login"><botton style="font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            background: #2a6444;padding: 10px 20px;
    border-radius: 5px;">Log in →</botton></a>
    </header>
    <main>
        <section class="register-container">
            <button class="register-btn" style="width: 200px; font-weight:bolder;">Register Here</button>
            <h2>Let's create your account!</h2>
            <p>Already have an account? <a href="/login.html">Log In!</a></p>
            <button class="google-signup">
                <img src="/googleicon.png" alt="Google Logo"> Sign up with Google
            </button>
            <div class="divider">
                <span>or</span>
            </div>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="register-btn">Register</button>
            </form>
        </section>
    </main>
</body>
</html>
