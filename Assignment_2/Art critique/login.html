<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Art Critiques</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <div class="logo"><img src="/logo.png" height="50px" width="100px" style="border-radius: 5px;"></div>
        <nav>
            <a href="/index.html">Home</a>
            <a href="/main.html">Upload Artwork</a>
            <a href="/about.html">About Us</a>
            <a href="/pricing.html">Pricing</a>
        </nav>
        <a href="/Register.html" class="login"><botton style="font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            background: #2a6444;padding: 10px 20px;
    border-radius: 5px;">Register →</botton></a>
    </header>
    <main>
        <section class="login-container">
            <button class="login-btn" style="width: 200px; font-weight: bolder;">Login</button>
            <h2>Welcome back! Ready to improve your art?</h2>
            <p>Don't have an account? <a href="/Register.html">Sign Up!</a></p>
            <button class="google-login">
                <img src="/googleicon.png" alt="Google Logo"> Sign up with Google
            </button>
            <div class="divider">
                <span>or</span>
            </div>
            <form>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <a href="/forget.html" class="forgot-password">Forgot Password?</a>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <div class="terms">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </section>
    </main>
</body>
</html>
