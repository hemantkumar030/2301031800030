<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Art Critic</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo"><img src="/logo.png" height="50px" width="100px" style="border-radius: 5px;"></div>
        <nav>
            <a href="/index.html">Home</a>
            <a href="/main.html">Upload Artwork</a>
            <a href="/about.html">About Us</a>
            <a href="/pricing.html">Pricing</a>
        </nav>
        <a href="/login.html" class="login">Log in →</a>
    </header>

    <div class="container">
        <h1 class="title">AI Art Critic</h1>

        <div class="upload-container">
            <div class="upload-box">
                <h2>Upload your artwork</h2>
                <div class="drop-area">
                    <span>Click or drag an image to upload<br>(JPEG, JPG, PNG, WEBP)</span>
                </div>
            </div>
            <div class="prompt-box">
                <h2>Additional Prompt</h2>
                <input type="text" placeholder="Add any instructions">
                <button class="analyze-btn">Analyze Image</button>
            </div>
        </div>

        <h2 class="result-title">Critique Results</h2>
        <div class="result-container">
            <div class="result-box">
                <h3>Strengths</h3>
                <div class="result-content"></div>
            </div>
            <div class="result-box">
                <h3>Improvement Areas</h3>
                <div class="result-content"></div>
            </div>
        </div>
    </div>
</body>
</html>
